# ===================================================================
# Frontend Deployment pour KaayJob
# ===================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: kaayjob
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      component: web
  template:
    metadata:
      labels:
        app: frontend
        component: web
    spec:
      containers:
        - name: frontend
          # Remplacer par votre image Docker Hub ou registry
          # image: votre-dockerhub-username/kaayjob-frontend:latest
          image: kaayjob-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: VITE_API_URL
              value: "https://kaayjob.onrender.com/api"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
# ===================================================================
# Frontend Service
# ===================================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: kaayjob
spec:
  type: NodePort  # Exposition publique pour Minikube
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
      nodePort: 30001  # Port fixe pour accès facile
  selector:
    app: frontend
    component: web
