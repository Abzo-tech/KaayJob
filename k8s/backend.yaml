# ===================================================================
# Backend Deployment pour KaayJob
# ===================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kaayjob
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      component: api
  template:
    metadata:
      labels:
        app: backend
        component: api
    spec:
      containers:
        - name: backend
          # Remplacer par votre image Docker Hub ou registry
          # image: votre-dockerhub-username/kaayjob-backend:latest
          image: kaayjob-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              value: "postgres://b9a0969b382808c1926482e10fd5a854e2fd7e020e81a9f3cc96e2885408ee95:sk_wqQoOr0QtZD7DSoDVsjPm@db.prisma.io:5432/postgres?sslmode=require"
            - name: JWT_SECRET
              value: "kaayjob-production-secret-key-change-in-production"
            - name: JWT_EXPIRES_IN
              value: "7d"
            - name: FRONTEND_URL
              value: "http://localhost:3000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
# ===================================================================
# Backend Service
# ===================================================================
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: kaayjob
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: backend
    component: api
