# ===================================================================
# ConfigMap Kubernetes pour KaayJob
# ===================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: kaayjob-config
  namespace: kaayjob
data:
  # Configuration Backend
  NODE_ENV: "production"
  PORT: "3000"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "kaayjob"
  FRONTEND_URL: "http://localhost"
  JWT_EXPIRES_IN: "7d"

  # Configuration Frontend
  VITE_API_URL: "/api"
