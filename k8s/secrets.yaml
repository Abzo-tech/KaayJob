# ===================================================================
# Secrets Kubernetes pour KaayJob
# ===================================================================
apiVersion: v1
kind: Secret
metadata:
  name: kaayjob-secrets
  namespace: kaayjob
type: Opaque
stringData:
  # Modifier ces valeurs en production!
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: kaayjob
  JWT_SECRET: kaayjob-super-secret-key-change-in-production-2024
  # Pour Docker Hub ou votre registry privé
  # DOCKER_USERNAME: votre-username
  # DOCKER_PASSWORD: votre-password
