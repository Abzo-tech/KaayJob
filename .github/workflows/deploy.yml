name: CI/CD Pipeline - Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/kaayjob-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/kaayjob-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.BACKEND_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Extract metadata for frontend
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.FRONTEND_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile.render
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./front
        file: ./front/Dockerfile
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG }}

    - name: Deploy to Kubernetes
      run: |
        # Update backend deployment
        sed -i "s|image:.*|image: ${{ env.BACKEND_IMAGE }}:latest|g" k8s/backend-deployment.yaml

        # Update frontend deployment
        sed -i "s|image:.*|image: ${{ env.FRONTEND_IMAGE }}:latest|g" k8s/frontend-deployment.yaml

        # Create namespace if it doesn't exist
        kubectl create namespace kaayjob --dry-run=client -o yaml | kubectl apply -f -

        # Apply only essential manifests (deployment and service)
        kubectl apply -f k8s/backend.yaml
        kubectl apply -f k8s/frontend.yaml

        # Wait for rollout to complete (only for successfully applied deployments)
        kubectl rollout status deployment/backend -n kaayjob || echo "Backend deployment failed - check logs"
        kubectl rollout status deployment/frontend -n kaayjob || echo "Frontend deployment failed - check logs"

    - name: Verify deployment
      run: |
        echo "✅ Backend deployment status:"
        kubectl get pods -l app=kaayjob-backend

        echo "✅ Frontend deployment status:"
        kubectl get pods -l app=kaayjob-frontend

        echo "✅ Services status:"
        kubectl get services -l app=kaayjob