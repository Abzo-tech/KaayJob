name: CI/CD Pipeline - Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/kaayjob-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/kaayjob-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata for backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.BACKEND_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Extract metadata for frontend
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.FRONTEND_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile.render
        load: true
        tags: kaayjob-backend:latest

    - name: Build frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./front
        file: ./front/Dockerfile
        load: true
        tags: kaayjob-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG }}

    - name: Deploy to Kubernetes
      run: |
        # Save images as tar files for transfer
        docker save kaayjob-backend:latest > backend.tar
        docker save kaayjob-frontend:latest > frontend.tar

        # Load images in Kubernetes (if supported) or use local registry
        # For now, update manifests to use pre-built images
        sed -i "s|image: kaayjob-backend:latest|image: kaayjob-backend:latest|g" k8s/backend.yaml
        sed -i "s|image: kaayjob-frontend:latest|image: kaayjob-frontend:latest|g" k8s/frontend.yaml

        # Create namespace
        kubectl create namespace kaayjob --dry-run=client -o yaml | kubectl apply -f -

        # Apply manifests
        kubectl apply -f k8s/backend.yaml
        kubectl apply -f k8s/frontend.yaml

        # For local development, you might need to set imagePullPolicy to Never
        # kubectl patch deployment backend -n kaayjob -p '{"spec":{"template":{"spec":{"containers":[{"name":"backend","imagePullPolicy":"Never"}]}}}}'
        # kubectl patch deployment frontend -n kaayjob -p '{"spec":{"template":{"spec":{"containers":[{"name":"frontend","imagePullPolicy":"Never"}]}}}}'

    - name: Verify deployment
      run: |
        echo "✅ Backend deployment status:"
        kubectl get pods -l app=backend -n kaayjob

        echo "✅ Frontend deployment status:"
        kubectl get pods -l app=frontend -n kaayjob

        echo "✅ Services status:"
        kubectl get services -n kaayjob

        echo "✅ External IP:"
        kubectl get services -n kaayjob frontend-service