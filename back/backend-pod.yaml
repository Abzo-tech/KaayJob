apiVersion: v1
kind: Pod
metadata:
  name: backend
  namespace: kaayjob
  labels:
    app: backend
    run: backend
spec:
  containers:
  - name: backend
    image: kaayjob-backend:latest
    imagePullPolicy: Never
    ports:
    - containerPort: 3000
    env:
    - name: DATABASE_URL
      value: "postgresql://postgres:postgres@postgres-service:5432/kaayjob"
    - name: DB_HOST
      value: "postgres-service"
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "kaayjob"
    - name: DB_USER
      value: "postgres"
    - name: DB_PASSWORD
      value: "postgres"
    - name: JWT_SECRET
      value: "kaayjob-secret-key-2024"
    - name: NODE_ENV
      value: "production"
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "1000m"
