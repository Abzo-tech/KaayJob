services:
  - type: web
    name: kaayjob-backend
    env: docker
    dockerfilePath: backend/Dockerfile.render
    dockerCommand: sh -c "npx prisma migrate deploy && node dist/index.js"
    envVars:
      - key: DATABASE_URL
        # Utiliser votre base de données existante - configurez cette valeur dans Render
        # Allez dans Dashboard > kaayjob-backend > Environment > Add Environment Variable
        # Clé: DATABASE_URL, Valeur: postgresql://votre-url-de-base-existante
        value: postgresql://placeholder:placeholder@placeholder:5432/placeholder
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://kaayjob.vercel.app

# Supprimé - utilisez votre base de données existante
# databases:
#   - name: kaayjob
#     plan: free
#     databaseName: kaayjob
