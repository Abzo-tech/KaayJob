services:
  - type: web
    name: kaayjob-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerCommand: sh -c "npx prisma migrate deploy && node dist/index.js"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kaayjob
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://kaayjob.vercel.app

databases:
  - name: kaayjob
    plan: free
    databaseName: kaayjob
