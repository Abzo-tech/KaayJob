<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1800" viewBox="0 0 2400 1800">
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .title { font: 700 34px Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #486581; }
      .section { font: 700 20px Arial, sans-serif; fill: #102a43; }
      .box { fill: #fff; stroke: #334e68; stroke-width: 1.6; rx: 12; ry: 12; }
      .head { fill: #dceefb; stroke: #334e68; stroke-width: 1.6; }
      .enum { fill: #fff7ed; stroke: #c05621; stroke-width: 1.6; rx: 12; ry: 12; }
      .note { fill: #fff8db; stroke: #d69e2e; stroke-width: 1.6; rx: 12; ry: 12; }
      .class-title { font: 700 18px Arial, sans-serif; fill: #102a43; }
      .class-text { font: 400 14px Arial, sans-serif; fill: #243b53; }
      .enum-title { font: 700 17px Arial, sans-serif; fill: #7c2d12; }
      .enum-text { font: 400 14px Arial, sans-serif; fill: #7c2d12; }
      .note-title { font: 700 16px Arial, sans-serif; fill: #7c2d12; }
      .note-text { font: 400 13px Arial, sans-serif; fill: #7c2d12; }
      .line { stroke: #52606d; stroke-width: 2; fill: none; }
      .mult { font: 700 14px Arial, sans-serif; fill: #102a43; }
      .legend { font: 400 14px Arial, sans-serif; fill: #243b53; }
      .legend-box { fill: #fff; stroke: #94a3b8; stroke-width: 1.5; rx: 12; ry: 12; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="2400" height="1800"/>

  <text x="60" y="60" class="title">KaayJob - Diagramme de classes UML ordonné</text>
  <text x="60" y="92" class="subtitle">Organisation logique : Utilisateurs et profils → Services et réservations → Paiement, abonnement et support</text>

  <text x="60" y="140" class="section">1. Utilisateurs et profils</text>

  <!-- Top row -->
  <rect class="box" x="60" y="170" width="340" height="300"/>
  <rect class="head" x="60" y="170" width="340" height="46"/>
  <text x="82" y="200" class="class-title">User</text>
  <text x="82" y="238" class="class-text">+ id: UUID</text>
  <text x="82" y="260" class="class-text">+ email: String</text>
  <text x="82" y="282" class="class-text">+ password: String</text>
  <text x="82" y="304" class="class-text">+ firstName: String</text>
  <text x="82" y="326" class="class-text">+ lastName: String</text>
  <text x="82" y="348" class="class-text">+ phone: String</text>
  <text x="82" y="370" class="class-text">+ role: Role</text>
  <text x="82" y="392" class="class-text">+ avatar: String?</text>
  <text x="82" y="414" class="class-text">+ isVerified: Boolean</text>
  <text x="82" y="436" class="class-text">+ isActive: Boolean</text>

  <rect class="box" x="500" y="170" width="360" height="340"/>
  <rect class="head" x="500" y="170" width="360" height="46"/>
  <text x="522" y="200" class="class-title">ProviderProfile</text>
  <text x="522" y="238" class="class-text">+ id: UUID</text>
  <text x="522" y="260" class="class-text">+ userId: UUID</text>
  <text x="522" y="282" class="class-text">+ businessName: String?</text>
  <text x="522" y="304" class="class-text">+ specialty: String?</text>
  <text x="522" y="326" class="class-text">+ bio: String?</text>
  <text x="522" y="348" class="class-text">+ hourlyRate: Decimal?</text>
  <text x="522" y="370" class="class-text">+ yearsExperience: Int?</text>
  <text x="522" y="392" class="class-text">+ location: String?</text>
  <text x="522" y="414" class="class-text">+ serviceRadius: Int?</text>
  <text x="522" y="436" class="class-text">+ isAvailable: Boolean</text>
  <text x="522" y="458" class="class-text">+ rating: Decimal</text>
  <text x="522" y="480" class="class-text">+ totalReviews: Int</text>

  <rect class="box" x="980" y="170" width="340" height="260"/>
  <rect class="head" x="980" y="170" width="340" height="46"/>
  <text x="1002" y="200" class="class-title">Category</text>
  <text x="1002" y="238" class="class-text">+ id: UUID</text>
  <text x="1002" y="260" class="class-text">+ name: String</text>
  <text x="1002" y="282" class="class-text">+ slug: String</text>
  <text x="1002" y="304" class="class-text">+ description: String?</text>
  <text x="1002" y="326" class="class-text">+ icon: String?</text>
  <text x="1002" y="348" class="class-text">+ image: String?</text>
  <text x="1002" y="370" class="class-text">+ parentId: UUID?</text>
  <text x="1002" y="392" class="class-text">+ isActive: Boolean</text>

  <text x="60" y="560" class="section">2. Services et réservations</text>

  <!-- Middle row -->
  <rect class="box" x="280" y="590" width="340" height="280"/>
  <rect class="head" x="280" y="590" width="340" height="46"/>
  <text x="302" y="620" class="class-title">Service</text>
  <text x="302" y="658" class="class-text">+ id: UUID</text>
  <text x="302" y="680" class="class-text">+ providerId: UUID</text>
  <text x="302" y="702" class="class-text">+ categoryId: UUID?</text>
  <text x="302" y="724" class="class-text">+ name: String</text>
  <text x="302" y="746" class="class-text">+ description: String?</text>
  <text x="302" y="768" class="class-text">+ price: Decimal</text>
  <text x="302" y="790" class="class-text">+ priceType: PriceType</text>
  <text x="302" y="812" class="class-text">+ duration: Int?</text>
  <text x="302" y="834" class="class-text">+ isActive: Boolean</text>

  <rect class="box" x="760" y="590" width="340" height="280"/>
  <rect class="head" x="760" y="590" width="340" height="46"/>
  <text x="782" y="620" class="class-title">Booking</text>
  <text x="782" y="658" class="class-text">+ id: UUID</text>
  <text x="782" y="680" class="class-text">+ clientId: UUID</text>
  <text x="782" y="702" class="class-text">+ serviceId: UUID</text>
  <text x="782" y="724" class="class-text">+ bookingDate: DateTime</text>
  <text x="782" y="746" class="class-text">+ bookingTime: String</text>
  <text x="782" y="768" class="class-text">+ duration: Int</text>
  <text x="782" y="790" class="class-text">+ status: BookingStatus</text>
  <text x="782" y="812" class="class-text">+ totalAmount: Decimal?</text>
  <text x="782" y="834" class="class-text">+ paymentStatus: PaymentStatus</text>

  <rect class="box" x="1240" y="590" width="340" height="250"/>
  <rect class="head" x="1240" y="590" width="340" height="46"/>
  <text x="1262" y="620" class="class-title">Review</text>
  <text x="1262" y="658" class="class-text">+ id: UUID</text>
  <text x="1262" y="680" class="class-text">+ bookingId: UUID</text>
  <text x="1262" y="702" class="class-text">+ clientId: UUID</text>
  <text x="1262" y="724" class="class-text">+ providerId: UUID</text>
  <text x="1262" y="746" class="class-text">+ serviceId: UUID?</text>
  <text x="1262" y="768" class="class-text">+ rating: Int</text>
  <text x="1262" y="790" class="class-text">+ comment: String?</text>

  <text x="60" y="940" class="section">3. Paiement, abonnement et support</text>

  <!-- Bottom row -->
  <rect class="box" x="60" y="970" width="340" height="250"/>
  <rect class="head" x="60" y="970" width="340" height="46"/>
  <text x="82" y="1000" class="class-title">Payment</text>
  <text x="82" y="1038" class="class-text">+ id: UUID</text>
  <text x="82" y="1060" class="class-text">+ bookingId: UUID?</text>
  <text x="82" y="1082" class="class-text">+ userId: UUID</text>
  <text x="82" y="1104" class="class-text">+ amount: Decimal</text>
  <text x="82" y="1126" class="class-text">+ paymentMethod: String?</text>
  <text x="82" y="1148" class="class-text">+ status: PaymentStatus</text>
  <text x="82" y="1170" class="class-text">+ transactionId: String?</text>

  <rect class="box" x="500" y="970" width="340" height="220"/>
  <rect class="head" x="500" y="970" width="340" height="46"/>
  <text x="522" y="1000" class="class-title">Subscription</text>
  <text x="522" y="1038" class="class-text">+ id: UUID</text>
  <text x="522" y="1060" class="class-text">+ userId: UUID</text>
  <text x="522" y="1082" class="class-text">+ plan: String</text>
  <text x="522" y="1104" class="class-text">+ status: String</text>
  <text x="522" y="1126" class="class-text">+ startDate: DateTime</text>
  <text x="522" y="1148" class="class-text">+ endDate: DateTime</text>

  <rect class="box" x="940" y="970" width="340" height="240"/>
  <rect class="head" x="940" y="970" width="340" height="46"/>
  <text x="962" y="1000" class="class-title">SubscriptionPlan</text>
  <text x="962" y="1038" class="class-text">+ id: UUID</text>
  <text x="962" y="1060" class="class-text">+ name: String</text>
  <text x="962" y="1082" class="class-text">+ slug: String</text>
  <text x="962" y="1104" class="class-text">+ description: String?</text>
  <text x="962" y="1126" class="class-text">+ price: Decimal</text>
  <text x="962" y="1148" class="class-text">+ duration: Int</text>
  <text x="962" y="1170" class="class-text">+ isActive: Boolean</text>

  <rect class="box" x="1380" y="970" width="360" height="220"/>
  <rect class="head" x="1380" y="970" width="360" height="46"/>
  <text x="1402" y="1000" class="class-title">VerificationRequest</text>
  <text x="1402" y="1038" class="class-text">+ id: UUID</text>
  <text x="1402" y="1060" class="class-text">+ userId: UUID</text>
  <text x="1402" y="1082" class="class-text">+ documents: Json?</text>
  <text x="1402" y="1104" class="class-text">+ status: String</text>
  <text x="1402" y="1126" class="class-text">+ reviewedBy: UUID?</text>
  <text x="1402" y="1148" class="class-text">+ reviewedAt: DateTime?</text>

  <rect class="box" x="1840" y="970" width="420" height="250"/>
  <rect class="head" x="1840" y="970" width="420" height="46"/>
  <text x="1862" y="1000" class="class-title">Notification</text>
  <text x="1862" y="1038" class="class-text">+ id: UUID</text>
  <text x="1862" y="1060" class="class-text">+ userId: UUID</text>
  <text x="1862" y="1082" class="class-text">+ title: String</text>
  <text x="1862" y="1104" class="class-text">+ message: Text</text>
  <text x="1862" y="1126" class="class-text">+ type: String</text>
  <text x="1862" y="1148" class="class-text">+ read: Boolean</text>
  <text x="1862" y="1170" class="class-text">+ link: String?</text>
  <text x="1862" y="1192" class="class-text">+ privateRecipients: Json?</text>

  <!-- Relations top to middle -->
  <line class="line" x1="400" y1="320" x2="500" y2="340"/>
  <text x="422" y="308" class="mult">1</text>
  <text x="470" y="366" class="mult">0..1</text>

  <line class="line" x1="860" y1="360" x2="980" y2="320"/>
  <text x="882" y="348" class="mult">1</text>
  <text x="944" y="308" class="mult">0..*</text>

  <line class="line" x1="680" y1="510" x2="450" y2="590"/>
  <text x="648" y="532" class="mult">1</text>
  <text x="468" y="578" class="mult">0..*</text>

  <line class="line" x1="1150" y1="430" x2="1150" y2="510"/>
  <line class="line" x1="1150" y1="510" x2="620" y2="510"/>
  <line class="line" x1="620" y1="510" x2="620" y2="650"/>
  <text x="1126" y="418" class="mult">1</text>
  <text x="632" y="638" class="mult">0..*</text>

  <line class="line" x1="620" y1="730" x2="760" y2="730"/>
  <text x="640" y="718" class="mult">1</text>
  <text x="725" y="718" class="mult">0..*</text>

  <line class="line" x1="1100" y1="730" x2="1240" y2="710"/>
  <text x="1120" y="718" class="mult">1</text>
  <text x="1206" y="698" class="mult">0..1</text>

  <line class="line" x1="680" y1="510" x2="680" y2="710"/>
  <line class="line" x1="680" y1="710" x2="760" y2="710"/>
  <text x="692" y="600" class="mult">1</text>
  <text x="725" y="698" class="mult">0..*</text>

  <line class="line" x1="680" y1="510" x2="680" y2="760"/>
  <line class="line" x1="680" y1="760" x2="1240" y2="760"/>
  <text x="692" y="620" class="mult">1</text>
  <text x="1205" y="748" class="mult">0..*</text>

  <line class="line" x1="230" y1="470" x2="230" y2="590"/>
  <line class="line" x1="230" y1="590" x2="760" y2="590"/>
  <line class="line" x1="760" y1="590" x2="760" y2="700"/>
  <text x="242" y="538" class="mult">1</text>
  <text x="772" y="688" class="mult">0..*</text>

  <!-- Middle to bottom -->
  <line class="line" x1="900" y1="870" x2="230" y2="970"/>
  <text x="850" y="878" class="mult">1</text>
  <text x="250" y="958" class="mult">0..*</text>

  <line class="line" x1="230" y1="470" x2="230" y2="970"/>
  <text x="242" y="730" class="mult">1</text>
  <text x="242" y="958" class="mult">0..*</text>

  <line class="line" x1="230" y1="470" x2="670" y2="970"/>
  <text x="252" y="498" class="mult">1</text>
  <text x="638" y="958" class="mult">0..*</text>

  <line class="line" x1="230" y1="470" x2="1560" y2="970"/>
  <text x="252" y="486" class="mult">1</text>
  <text x="1528" y="958" class="mult">0..*</text>

  <line class="line" x1="230" y1="470" x2="1840" y2="1090"/>
  <text x="252" y="482" class="mult">1</text>
  <text x="1808" y="1078" class="mult">0..*</text>

  <line class="line" x1="840" y1="1080" x2="940" y2="1080"/>
  <text x="860" y="1068" class="mult">0..*</text>
  <text x="905" y="1068" class="mult">0..1</text>

  <!-- Enums -->
  <text x="60" y="1310" class="section">4. Énumérations</text>

  <rect class="enum" x="60" y="1340" width="260" height="180"/>
  <text x="82" y="1370" class="enum-title">Role</text>
  <text x="82" y="1408" class="enum-text">CLIENT</text>
  <text x="82" y="1430" class="enum-text">PRESTATAIRE</text>
  <text x="82" y="1452" class="enum-text">ADMIN</text>

  <rect class="enum" x="380" y="1340" width="280" height="180"/>
  <text x="402" y="1370" class="enum-title">PriceType</text>
  <text x="402" y="1408" class="enum-text">FIXED</text>
  <text x="402" y="1430" class="enum-text">HOURLY</text>
  <text x="402" y="1452" class="enum-text">QUOTE</text>

  <rect class="enum" x="720" y="1340" width="310" height="220"/>
  <text x="742" y="1370" class="enum-title">BookingStatus</text>
  <text x="742" y="1408" class="enum-text">PENDING</text>
  <text x="742" y="1430" class="enum-text">CONFIRMED</text>
  <text x="742" y="1452" class="enum-text">IN_PROGRESS</text>
  <text x="742" y="1474" class="enum-text">COMPLETED</text>
  <text x="742" y="1496" class="enum-text">CANCELLED</text>
  <text x="742" y="1518" class="enum-text">REJECTED</text>

  <rect class="enum" x="1090" y="1340" width="290" height="180"/>
  <text x="1112" y="1370" class="enum-title">PaymentStatus</text>
  <text x="1112" y="1408" class="enum-text">PENDING</text>
  <text x="1112" y="1430" class="enum-text">PAID</text>
  <text x="1112" y="1452" class="enum-text">REFUNDED</text>

  <rect class="note" x="1450" y="1340" width="810" height="200"/>
  <text x="1472" y="1370" class="note-title">Note</text>
  <text x="1472" y="1405" class="note-text">• `Notification` est incluse car elle existe dans le schéma SQL et dans les routes/services du projet.</text>
  <text x="1472" y="1430" class="note-text">• Les relations représentées suivent principalement `schema.prisma`, avec complément depuis `schema.ts` pour `Notification`.</text>
  <text x="1472" y="1455" class="note-text">• L’ordre choisi vise la lisibilité pour un rapport : profil, service, réservation, paiement, abonnement, support.</text>

  <rect class="legend-box" x="60" y="1610" width="2200" height="120"/>
  <text x="82" y="1642" class="class-title">Lecture rapide</text>
  <text x="82" y="1672" class="legend">• `User` est la classe centrale. Un `User` peut être client, prestataire ou administrateur.</text>
  <text x="82" y="1696" class="legend">• Un prestataire possède éventuellement un `ProviderProfile`, publie des `Service`, reçoit des `Booking` et des `Review`.</text>
  <text x="82" y="1720" class="legend">• Les fonctions de paiement et de support sont regroupées en bas pour éviter les croisements et améliorer la lecture dans Word.</text>
</svg>
