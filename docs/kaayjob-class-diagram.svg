  <text x="1730" y="698" class="class-attr">+ read: Boolean</text>
  <text x="1730" y="720" class="class-attr">+ link: String?</text>

  <!-- Class boxes row 3 -->
  <rect class="box" x="540" y="900" width="300" height="210"/>
  <rect class="head" x="540" y="900" width="300" height="46"/>
  <text x="560" y="930" class="class-name">Subscription</text>
  <text x="560" y="968" class="class-attr">+ id: UUID</text>
  <text x="560" y="990" class="class-attr">+ userId: UUID</text>
