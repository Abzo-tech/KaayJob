  <text x="1730" y="292" class="class-attr">+ categoryId: UUID?</text>
  <text x="1730" y="314" class="class-attr">+ name: String</text>
  <text x="1730" y="336" class="class-attr">+ price: Decimal</text>
  <text x="1730" y="358" class="class-attr">+ priceType: FIXED | HOURLY | QUOTE</text>
  <text x="1730" y="380" class="class-attr">+ duration: Int?</text>
  <text x="1730" y="402" class="class-attr">+ isActive: Boolean</text>

  <!-- Class boxes row 2 -->
  <rect class="box" x="540" y="520" width="300" height="260"/>
  <rect class="head" x="540" y="520" width="300" height="46"/>
  <text x="560" y="550" class="class-name">Booking</text>
  <text x="560" y="588" class="class-attr">+ id: UUID</text>
  <text x="560" y="610" class="class-attr">+ clientId: UUID</text>
  <text x="560" y="632" class="class-attr">+ serviceId: UUID</text>
  <text x="560" y="654" class="class-attr">+ bookingDate: DateTime</text>
  <text x="560" y="676" class="class-attr">+ bookingTime: String</text>
  <text x="560" y="698" class="class-attr">+ status: PENDING..REJECTED</text>
  <text x="560" y="720" class="class-attr">+ address: String</text>
  <text x="560" y="742" class="class-attr">+ totalAmount: Decimal?</text>
  <text x="560" y="764" class="class-attr">+ paymentStatus: PENDING | PAID | REFUNDED</text>

  <rect class="box" x="930" y="520" width="300" height="220"/>
  <rect class="head" x="930" y="520" width="300" height="46"/>
  <text x="950" y="550" class="class-name">Review</text>
  <text x="950" y="588" class="class-attr">+ id: UUID</text>
  <text x="950" y="610" class="class-attr">+ bookingId: UUID</text>
  <text x="950" y="632" class="class-attr">+ clientId: UUID</text>
  <text x="950" y="654" class="class-attr">+ providerId: UUID</text>
  <text x="950" y="676" class="class-attr">+ serviceId: UUID?</text>
  <text x="950" y="698" class="class-attr">+ rating: Int</text>
  <text x="950" y="720" class="class-attr">+ comment: String?</text>

  <rect class="box" x="1320" y="520" width="300" height="220"/>
  <rect class="head" x="1320" y="520" width="300" height="46"/>
  <text x="1340" y="550" class="class-name">Payment</text>
  <text x="1340" y="588" class="class-attr">+ id: UUID</text>
  <text x="1340" y="610" class="class-attr">+ bookingId: UUID?</text>
  <text x="1340" y="632" class="class-attr">+ userId: UUID</text>
  <text x="1340" y="654" class="class-attr">+ amount: Decimal</text>
  <text x="1340" y="676" class="class-attr">+ paymentMethod: String?</text>
  <text x="1340" y="698" class="class-attr">+ status: PENDING | PAID | REFUNDED</text>
  <text x="1340" y="720" class="class-attr">+ transactionId: String?</text>

  <rect class="box" x="1710" y="520" width="300" height="220"/>
  <rect class="head" x="1710" y="520" width="300" height="46"/>
