  <!-- Legend -->
  <rect class="box" x="540" y="1210" width="1490" height="210"/>
  <rect class="head" x="540" y="1210" width="1490" height="46"/>
  <text x="560" y="1240" class="class-name">Légende et lecture rapide</text>
  <text x="560" y="1285" class="legend">• Les acteurs proviennent des rôles visibles côté frontend et backend : Visiteur, Client, Prestataire, Administrateur.</text>
  <text x="560" y="1315" class="legend">• Le coeur métier suit la chaîne : User → ProviderProfile → Service → Booking → Review / Payment.</text>
  <text x="560" y="1345" class="legend">• La monétisation prestataire s’appuie sur Subscription et SubscriptionPlan.</text>
  <text x="560" y="1375" class="legend">• VerificationRequest couvre le processus de validation prestataire.</text>
  <text x="560" y="1405" class="legend">• Notification est utilisée massivement par les routes/services même si sa définition est portée par le schéma SQL.</text>
</svg>
