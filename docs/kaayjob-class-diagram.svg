<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1520" viewBox="0 0 2200 1520">
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .title { font: 700 34px Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #486581; }
      .section { font: 700 20px Arial, sans-serif; fill: #0b3c49; }
      .actor-label { font: 700 18px Arial, sans-serif; fill: #102a43; text-anchor: middle; }
      .actor-text { font: 400 14px Arial, sans-serif; fill: #334e68; text-anchor: middle; }
      .class-name { font: 700 18px Arial, sans-serif; fill: #102a43; }
      .class-attr { font: 400 14px Arial, sans-serif; fill: #243b53; }
      .note-title { font: 700 16px Arial, sans-serif; fill: #7c2d12; }
      .note-text { font: 400 13px Arial, sans-serif; fill: #7c2d12; }
      .legend { font: 400 14px Arial, sans-serif; fill: #243b53; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 1.5; rx: 12; ry: 12; }
      .head { fill: #d9eaf7; stroke: #1f2937; stroke-width: 1.5; }
      .actor-box { fill: #fffaf0; stroke: #8d6e63; stroke-width: 1.5; rx: 14; ry: 14; }
      .note { fill: #fff3cd; stroke: #b7791f; stroke-width: 1.5; rx: 10; ry: 10; }
      .line { stroke: #52606d; stroke-width: 2; fill: none; }
      .assoc { stroke: #52606d; stroke-width: 1.7; fill: none; }
      .actor-line { stroke: #b08968; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
      .mult { font: 700 14px Arial, sans-serif; fill: #102a43; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#52606d" />
    </marker>
    <marker id="arrowActor" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#b08968" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="2200" height="1520"/>

  <text x="70" y="65" class="title">KaayJob - Diagramme de classes avec acteurs</text>
  <text x="70" y="95" class="subtitle">Base du schéma : backend/prisma/schema.prisma + backend/src/config/schema.ts + rôles visibles dans front/src/App.tsx</text>

  <text x="90" y="145" class="section">Acteurs</text>
  <text x="560" y="145" class="section">Classes métier principales</text>

  <!-- Actors -->
  <rect class="actor-box" x="50" y="180" width="360" height="180"/>
  <circle cx="120" cy="240" r="22" fill="#fff" stroke="#8d6e63" stroke-width="2"/>
  <line x1="120" y1="262" x2="120" y2="315" stroke="#8d6e63" stroke-width="2"/>
  <line x1="92" y1="282" x2="148" y2="282" stroke="#8d6e63" stroke-width="2"/>
  <line x1="120" y1="315" x2="95" y2="345" stroke="#8d6e63" stroke-width="2"/>
  <line x1="120" y1="315" x2="145" y2="345" stroke="#8d6e63" stroke-width="2"/>
  <text x="260" y="235" class="actor-label">Visiteur</text>
  <text x="260" y="265" class="actor-text">consulte les catégories</text>
  <text x="260" y="287" class="actor-text">parcourt les services</text>
  <text x="260" y="309" class="actor-text">voit les profils publics</text>

  <rect class="actor-box" x="50" y="390" width="360" height="210"/>
  <circle cx="120" cy="455" r="22" fill="#fff" stroke="#8d6e63" stroke-width="2"/>
  <line x1="120" y1="477" x2="120" y2="535" stroke="#8d6e63" stroke-width="2"/>
  <line x1="92" y1="497" x2="148" y2="497" stroke="#8d6e63" stroke-width="2"/>
  <line x1="120" y1="535" x2="95" y2="570" stroke="#8d6e63" stroke-width="2"/>
  <line x1="120" y1="535" x2="145" y2="570" stroke="#8d6e63" stroke-width="2"/>
  <text x="260" y="445" class="actor-label">Client</text>
  <text x="260" y="475" class="actor-text">s'inscrit / se connecte</text>
  <text x="260" y="497" class="actor-text">réserve un service</text>
  <text x="260" y="519" class="actor-text">effectue un paiement</text>
  <text x="260" y="541" class="actor-text">laisse un avis</text>
  <text x="260" y="563" class="actor-text">reçoit des notifications</text>

  <rect class="actor-box" x="50" y="635" width="360" height="230"/>
  <circle cx="120" cy="705" r="22" fill="#fff" stroke="#8d6e63" stroke-width="2"/>
  <line x1="120" y1="727" x2="120" y2="790" stroke="#8d6e63" stroke-width="2"/>
  <line x1="92" y1="748" x2="148" y2="748" stroke="#8d6e63" stroke-width="2"/>
  <line x1="120" y1="790" x2="95" y2="828" stroke="#8d6e63" stroke-width="2"/>
  <line x1="120" y1="790" x2="145" y2="828" stroke="#8d6e63" stroke-width="2"/>
  <text x="260" y="695" class="actor-label">Prestataire</text>
  <text x="260" y="725" class="actor-text">gère son profil pro</text>
  <text x="260" y="747" class="actor-text">publie des services</text>
  <text x="260" y="769" class="actor-text">traite les réservations</text>
  <text x="260" y="791" class="actor-text">demande une vérification</text>
  <text x="260" y="813" class="actor-text">souscrit à un abonnement</text>
  <text x="260" y="835" class="actor-text">reçoit des notifications</text>

  <rect class="actor-box" x="50" y="900" width="360" height="210"/>
  <circle cx="120" cy="965" r="22" fill="#fff" stroke="#8d6e63" stroke-width="2"/>
  <line x1="120" y1="987" x2="120" y2="1045" stroke="#8d6e63" stroke-width="2"/>
  <line x1="92" y1="1007" x2="148" y2="1007" stroke="#8d6e63" stroke-width="2"/>
  <line x1="120" y1="1045" x2="95" y2="1080" stroke="#8d6e63" stroke-width="2"/>
  <line x1="120" y1="1045" x2="145" y2="1080" stroke="#8d6e63" stroke-width="2"/>
  <text x="260" y="955" class="actor-label">Administrateur</text>
  <text x="260" y="985" class="actor-text">gère utilisateurs et rôles</text>
  <text x="260" y="1007" class="actor-text">modère catégories</text>
  <text x="260" y="1029" class="actor-text">pilote abonnements / plans</text>
  <text x="260" y="1051" class="actor-text">consulte analytics et notifications</text>

  <!-- Class boxes row 1 -->
  <rect class="box" x="540" y="180" width="300" height="220"/>
  <rect class="head" x="540" y="180" width="300" height="46"/>
  <text x="560" y="210" class="class-name">User</text>
  <text x="560" y="248" class="class-attr">+ id: UUID</text>
  <text x="560" y="270" class="class-attr">+ email: String</text>
  <text x="560" y="292" class="class-attr">+ password: String</text>
  <text x="560" y="314" class="class-attr">+ firstName: String</text>
  <text x="560" y="336" class="class-attr">+ lastName: String</text>
  <text x="560" y="358" class="class-attr">+ phone: String</text>
  <text x="560" y="380" class="class-attr">+ role: CLIENT | PRESTATAIRE | ADMIN</text>

  <rect class="box" x="930" y="180" width="300" height="240"/>
  <rect class="head" x="930" y="180" width="300" height="46"/>
  <text x="950" y="210" class="class-name">ProviderProfile</text>
  <text x="950" y="248" class="class-attr">+ id: UUID</text>
  <text x="950" y="270" class="class-attr">+ userId: UUID</text>
  <text x="950" y="292" class="class-attr">+ businessName: String?</text>
  <text x="950" y="314" class="class-attr">+ specialty: String?</text>
  <text x="950" y="336" class="class-attr">+ hourlyRate: Decimal?</text>
  <text x="950" y="358" class="class-attr">+ serviceRadius: Int?</text>
  <text x="950" y="380" class="class-attr">+ isAvailable: Boolean</text>
  <text x="950" y="402" class="class-attr">+ rating: Decimal</text>

  <rect class="box" x="1320" y="180" width="300" height="220"/>
  <rect class="head" x="1320" y="180" width="300" height="46"/>
  <text x="1340" y="210" class="class-name">Category</text>
  <text x="1340" y="248" class="class-attr">+ id: UUID</text>
  <text x="1340" y="270" class="class-attr">+ name: String</text>
  <text x="1340" y="292" class="class-attr">+ slug: String</text>
  <text x="1340" y="314" class="class-attr">+ description: String?</text>
  <text x="1340" y="336" class="class-attr">+ parentId: UUID?</text>
  <text x="1340" y="358" class="class-attr">+ isActive: Boolean</text>
  <text x="1340" y="380" class="class-attr">+ displayOrder: Int</text>

  <rect class="box" x="1710" y="180" width="300" height="240"/>
  <rect class="head" x="1710" y="180" width="300" height="46"/>
  <text x="1730" y="210" class="class-name">Service</text>
  <text x="1730" y="248" class="class-attr">+ id: UUID</text>
