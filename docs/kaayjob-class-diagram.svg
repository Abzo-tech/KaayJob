  <text x="560" y="1078" class="class-attr">+ endDate: DateTime</text>

  <rect class="box" x="930" y="900" width="300" height="230"/>
  <rect class="head" x="930" y="900" width="300" height="46"/>
  <text x="950" y="930" class="class-name">SubscriptionPlan</text>
  <text x="950" y="968" class="class-attr">+ id: UUID</text>
  <text x="950" y="990" class="class-attr">+ name: String</text>
  <text x="950" y="1012" class="class-attr">+ slug: String</text>
  <text x="950" y="1034" class="class-attr">+ price: Decimal</text>
  <text x="950" y="1056" class="class-attr">+ duration: Int</text>
  <text x="950" y="1078" class="class-attr">+ features: Json</text>
  <text x="950" y="1100" class="class-attr">+ isActive: Boolean</text>

  <rect class="box" x="1320" y="900" width="300" height="210"/>
  <rect class="head" x="1320" y="900" width="300" height="46"/>
  <text x="1340" y="930" class="class-name">VerificationRequest</text>
  <text x="1340" y="968" class="class-attr">+ id: UUID</text>
  <text x="1340" y="990" class="class-attr">+ userId: UUID</text>
  <text x="1340" y="1012" class="class-attr">+ documents: Json?</text>
  <text x="1340" y="1034" class="class-attr">+ status: pending/approved/rejected</text>
  <text x="1340" y="1056" class="class-attr">+ reviewedBy: UUID?</text>
  <text x="1340" y="1078" class="class-attr">+ reviewedAt: DateTime?</text>

  <rect class="note" x="1710" y="900" width="320" height="170"/>
  <text x="1730" y="935" class="note-title">Note d’alignement</text>
  <text x="1730" y="965" class="note-text">Le projet mélange deux sources de vérité :</text>
  <text x="1730" y="989" class="note-text">1. Prisma pour le coeur du domaine</text>
  <text x="1730" y="1013" class="note-text">2. schema.ts SQL pour Notification</text>
  <text x="1730" y="1037" class="note-text">C’est pourquoi Notification est affichée</text>
  <text x="1730" y="1061" class="note-text">dans ce diagramme même si elle n’est pas</text>
  <text x="1730" y="1085" class="note-text">déclarée dans schema.prisma.</text>

