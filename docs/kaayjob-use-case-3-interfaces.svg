  <rect class="legend-box" x="130" y="1510" width="2250" height="200"/>
  <text x="160" y="1545" class="panel-title">Lecture du diagramme</text>
  <text x="160" y="1585" class="legend">• Les trois interfaces correspondent aux espaces réellement rendus par [front/src/App.tsx](/home/mame-diarra-bousso/Documents/projet_kaayjob/KaayJob/front/src/App.tsx) : client, prestataire, administrateur.</text>
  <text x="160" y="1615" class="legend">• Les cas d’usage proviennent des écrans visibles dans les sidebars et pages, complétés par les flux décrits dans [USER_FLOWS.md](/home/mame-diarra-bousso/Documents/projet_kaayjob/KaayJob/USER_FLOWS.md) et les tests [provider-flow.spec.ts](/home/mame-diarra-bousso/Documents/projet_kaayjob/KaayJob/front/tests/provider-flow.spec.ts).</text>
  <text x="160" y="1645" class="legend">• `&lt;&lt;include&gt;&gt;` indique une sous-action nécessaire dans le projet. `&lt;&lt;extend&gt;&gt;` indique une action optionnelle ou déclenchée selon le contexte.</text>
  <text x="160" y="1675" class="legend">• Ce schéma ne mélange plus le diagramme de classes avec le diagramme de cas d’usage.</text>
</svg>
